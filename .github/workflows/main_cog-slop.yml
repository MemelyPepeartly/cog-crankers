# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - cog-slop

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      redeploy_reason:
        description: "Optional reason for manual API redeploy"
        required: false
        default: "Manual Cog Slop API redeploy"

env:
  API_PROJECT_PATH: apps/api/CogSlop.Api/CogSlop.Api.csproj
  PUBLISH_PATH: ${{ github.workspace }}/publish

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore API project
        run: dotnet restore ${{ env.API_PROJECT_PATH }}

      - name: Build API project
        run: dotnet build ${{ env.API_PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish API project
        run: dotnet publish ${{ env.API_PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_PATH }}

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: cog-slop-api
          path: ${{ env.PUBLISH_PATH }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: cog-slop-api
          path: ${{ env.PUBLISH_PATH }}
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cog-slop'
          slot-name: 'Production'
          package: ${{ env.PUBLISH_PATH }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_79F347B5A4524D01BAFCE46C9CA6A240 }}
